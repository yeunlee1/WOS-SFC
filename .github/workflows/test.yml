# PR 트리거 자동 검증 — web Vitest + 빌드 + server 빌드.
# Branch protection의 required status check 대상이 된다.
name: test

on:
  pull_request:
    branches: [master]
    paths:
      - 'web/**'
      - 'server/**'
      - 'package.json'
      - '.github/workflows/test.yml'
  push:
    branches: [master]

jobs:
  web:
    name: Web (Vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Test (Vitest)
        working-directory: web
        run: npm test -- --run
      - name: Build
        working-directory: web
        run: npm run build

  server:
    name: Server (NestJS build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install
        working-directory: server
        run: npm ci
      - name: Build
        working-directory: server
        run: npm run build
