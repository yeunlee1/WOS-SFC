<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOS SFC 전투 보조</title>
  <style>
    /* 새로고침 직후 React mount 전까지 빈 화면을 가리는 splash.
       외부 stylesheet 로드 전에 보여야 하므로 인라인.
       App.jsx 첫 effect에서 #app-splash를 제거(또는 fade)한다. */
    #app-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: linear-gradient(135deg, #fdf4ff 0%, #fce7f3 100%);
      color: #831843;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                   "Noto Sans KR", sans-serif;
      z-index: 9999;
      opacity: 1;
      transition: opacity 320ms ease;
    }
    #app-splash.app-splash--leaving { opacity: 0; pointer-events: none; }
    #app-splash .app-splash__title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #app-splash .app-splash__sub {
      font-size: 13px;
      color: #9d174d;
      opacity: 0.85;
    }
    #app-splash .app-splash__spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(217, 70, 168, 0.18);
      border-top-color: #d946a8;
      animation: app-splash-spin 0.85s linear infinite;
    }
    @keyframes app-splash-spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-color-scheme: dark) {
      #app-splash { background: linear-gradient(135deg, #1f1530 0%, #2b1a3d 100%); color: #fce7f3; }
      #app-splash .app-splash__sub { color: #f9a8d4; }
    }
  </style>
</head>
<body>
  <div id="app-splash" role="status" aria-live="polite">
    <div class="app-splash__spinner" aria-hidden="true"></div>
    <div class="app-splash__title">🌸 WOS SFC</div>
    <div class="app-splash__sub">잠시만요…</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
